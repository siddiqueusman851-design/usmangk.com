<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2NOWsbs816OSk1GecBJou36Uqp7U_nKZoMvcj-Z29mo" />
    <title>usman.gk - Pro Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* Logo Area */
        .logo-section { display: flex; align-items: center; margin-bottom: 25px; cursor: pointer; }
        .gear-brain-logo { width: 50px; height: 50px; margin-right: 10px; background: linear-gradient(135deg, #1a3a5f 50%, #c5a02e 50%); clip-path: polygon(50% 0%, 61% 5%, 72% 0%, 80% 10%, 95% 12%, 90% 28%, 100% 38%, 95% 54%, 100% 70%, 85% 78%, 80% 95%, 65% 90%, 50% 100%, 35% 90%, 20% 95%, 15% 78%, 0% 70%, 5% 54%, 0% 38%, 10% 28%, 5% 12%, 20% 10%, 28% 0%, 39% 5%); display: flex; align-items: center; justify-content: center; }
        .gear-brain-logo i { color: white; font-size: 20px; }
        .logo-text-box h1 { font-size: 30px; color: #1a3a5f; font-weight: 900; }

        /* Control Panel */
        .search-container { width: 100%; max-width: 800px; background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        .main-search { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 30px; outline: none; font-size: 16px; margin-bottom: 15px; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-search { background: #1a3a5f; color: white; }
        .btn-tab { background: #34a853; color: white; }
        .btn-clear { background: #ea4335; color: white; }

        /* Result Cards Grid */
        #results-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); 
            gap: 20px; 
            width: 100%; 
            max-width: 1200px; 
        }

        .result-card { background: white; padding: 15px; border-radius: 15px; border-top: 5px solid #1a3a5f; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .result-card h3 { color: #1a3a5f; font-size: 18px; margin-bottom: 10px; }
        .result-card p { font-size: 14px; color: #444; margin-bottom: 10px; height: 60px; overflow-y: auto; }

        /* FIXED VIDEO CONTAINER */
        .video-box { 
            width: 100%; 
            position: relative; 
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0; 
            background: #000; 
            border-radius: 10px; 
            overflow: hidden; 
        }
        .video-box iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
    </style>
</head>
<body>

    <div class="logo-section" onclick="window.location.reload()">
        <div class="gear-brain-logo"><i class="fa-solid fa-brain"></i></div>
        <div class="logo-text-box"><h1>USMAN.GK</h1></div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="main-search" placeholder="Type topic (e.g. MrBeast, Space)...">
        <div class="btn-group">
            <button class="btn-search" onclick="multiSearch(1)">Single Result</button>
            <button class="btn-tab" onclick="multiSearch(2)">Open 2 Tabs Inside</button>
            <button class="btn-tab" onclick="multiSearch(4)">Open 4 Tabs Inside</button>
            <button class="btn-clear" onclick="document.getElementById('results-grid').innerHTML=''">Clear All</button>
        </div>
    </div>

    <div id="results-grid"></div>

    <script>
        async function multiSearch(count) {
            const query = document.getElementById('searchInput').value.trim();
            const grid = document.getElementById('results-grid');
            if (!query) return;

            for (let i = 0; i < count; i++) {
                const cardId = `id-${Date.now()}-${i}`;
                
                // Naya Card banana (Ye aapki website ke andar hi rahega)
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <h3><i class="fa-solid fa-bolt"></i> Tab ${i+1}: ${query}</h3>
                    <p id="text-${cardId}">Loading info from Wikipedia...</p>
                    <div class="video-box">
                        <iframe src="https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(query)}&index=${i}" allowfullscreen></iframe>
                    </div>
                `;
                grid.prepend(card); // Naya result sabse upar dikhega

                // Wikipedia Data Fetching
                fetchWikiData(query, cardId);
            }
        }

        async function fetchWikiData(query, cardId) {
            try {
                // Smart Wiki Fetch
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const data = await res.json();
                document.getElementById(`text-${cardId}`).innerText = data.extract || "No text details found.";
            } catch (e) {
                document.getElementById(`text-${cardId}`).innerText = "Wiki details not available.";
            }
        }
    </script>
</body>
</html>
