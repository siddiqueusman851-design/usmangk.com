<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>usman.gk - World Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }

        /* Logo Section */
        .logo-section { display: flex; align-items: center; margin-top: 40px; margin-bottom: 25px; cursor: pointer; }
        .gear-brain-logo {
            width: 60px; height: 60px; margin-right: 12px;
            background: linear-gradient(135deg, #1a3a5f 50%, #c5a02e 50%);
            clip-path: polygon(50% 0%, 61% 5%, 72% 0%, 80% 10%, 95% 12%, 90% 28%, 100% 38%, 95% 54%, 100% 70%, 85% 78%, 80% 95%, 65% 90%, 50% 100%, 35% 90%, 20% 95%, 15% 78%, 0% 70%, 5% 54%, 0% 38%, 10% 28%, 5% 12%, 20% 10%, 28% 0%, 39% 5%);
            display: flex; align-items: center; justify-content: center;
        }
        .gear-brain-logo i { color: white; font-size: 25px; }
        .logo-text-box h1 { font-size: 38px; color: #1a3a5f; font-weight: 900; line-height: 0.8; }
        .logo-text-box span { font-size: 42px; color: #1a3a5f; font-weight: 800; }

        /* Search Area */
        .search-wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        .input-box { width: 100%; position: relative; }
        .main-search {
            width: 100%; padding: 15px 45px; border: 1px solid #dfe1e5; 
            border-radius: 30px; font-size: 16px; outline: none; background: white;
        }
        .btn-search {
            padding: 12px; background: #1a3a5f; color: white; border: none; 
            border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px;
        }

        /* Result Display Area */
        #result-display {
            width: 100%; max-width: 650px; margin-top: 20px; padding: 20px;
            background: white; border-radius: 15px; border: 1px solid #dadce0;
            display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* Translate Button Feature */
        .translate-bar {
            display: flex; justify-content: flex-end; margin-bottom: 10px;
        }
        .btn-translate {
            background: #f0f2f5; border: 1px solid #ddd; padding: 5px 12px;
            border-radius: 20px; font-size: 13px; cursor: pointer; color: #1a3a5f; font-weight: bold;
        }
        .btn-translate i { margin-right: 5px; }

        .res-image { width: 100%; max-height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }
        .res-head { font-size: 22px; color: #1a3a5f; font-weight: bold; margin-bottom: 10px; }
        .res-body { font-size: 16px; color: #3c4043; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="logo-section" onclick="location.reload()">
        <div class="gear-brain-logo"><i class="fa-solid fa-brain"></i></div>
        <div class="logo-text-box"><h1>USMAN</h1><span>.GK</span></div>
    </div>

    <div class="search-wrapper">
        <div class="input-box">
            <i class="fa-solid fa-magnifying-glass" style="position:absolute; left:18px; top:18px; color:#9aa0a6;"></i>
            <input type="text" id="searchInput" class="main-search" placeholder="Search anything...">
        </div>
        <button class="btn-search" onclick="executeSearch()">Search Knowledge</button>
    </div>

    <div id="result-display">
        <div class="translate-bar">
            <button class="btn-translate" onclick="toggleTranslation()">
                <i class="fa-solid fa-language"></i> Translate (اردو / English)
            </button>
        </div>
        <img id="res-img" class="res-image" src="" style="display:none;">
        <div id="rtitle" class="res-head"></div>
        <div id="rtext" class="res-body"></div>
    </div>

    <script>
        let currentData = { en: "", ur: "", currentLang: "en" };

        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const resultBox = document.getElementById('result-display');
            if (!query) return;

            resultBox.style.display = "block";
            document.getElementById('rtitle').innerText = "Searching...";
            document.getElementById('rtext').innerText = "";

            try {
                // Fetch English version
                const resEn = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const dataEn = await resEn.json();
                
                // Fetch Urdu version
                const resUr = await fetch(`https://ur.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const dataUr = await resUr.json();

                currentData.en = dataEn.extract || "No English description available.";
                currentData.ur = dataUr.extract || "اردو میں معلومات دستیاب نہیں ہے۔";
                currentData.titleEn = dataEn.title;
                currentData.titleUr = dataUr.title || dataEn.title;
                
                // Set initial view (English)
                updateUI("en");

                if (dataEn.originalimage) {
                    document.getElementById('res-img').src = dataEn.originalimage.source;
                    document.getElementById('res-img').style.display = "block";
                }
            } catch (e) {
                document.getElementById('rtitle').innerText = "Error";
                document.getElementById('rtext').innerText = "Could not find results.";
            }
        }

        function updateUI(lang) {
            const body = document.getElementById('rtext');
            const title = document.getElementById('rtitle');
            
            if(lang === "en") {
                title.innerText = currentData.titleEn;
                body.innerText = currentData.en;
                body.style.direction = "ltr";
                body.style.textAlign = "left";
            } else {
                title.innerText = currentData.titleUr;
                body.innerText = currentData.ur;
                body.style.direction = "rtl";
                body.style.textAlign = "right";
            }
            currentData.currentLang = lang;
        }

        function toggleTranslation() {
            const newLang = currentData.currentLang === "en" ? "ur" : "en";
            updateUI(newLang);
        }
    </script>
</body>
</html>
