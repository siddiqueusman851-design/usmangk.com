<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2NOWsbs816OSk1GecBJou36Uqp7U_nKZoMvcj-Z29mo" />
    <title>usman.gk - World Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* Logo Area (FIXED NAME) */
        .logo-section { display: flex; align-items: center; margin-bottom: 25px; cursor: pointer; }
        .gear-brain-logo { width: 50px; height: 50px; margin-right: 12px; background: linear-gradient(135deg, #1a3a5f 50%, #c5a02e 50%); clip-path: polygon(50% 0%, 61% 5%, 72% 0%, 80% 10%, 95% 12%, 90% 28%, 100% 38%, 95% 54%, 100% 70%, 85% 78%, 80% 95%, 65% 90%, 50% 100%, 35% 90%, 20% 95%, 15% 78%, 0% 70%, 5% 54%, 0% 38%, 10% 28%, 5% 12%, 20% 10%, 28% 0%, 39% 5%); display: flex; align-items: center; justify-content: center; }
        .gear-brain-logo i { color: white; font-size: 22px; }
        .logo-text-box h1 { font-size: 34px; color: #1a3a5f; font-weight: 900; line-height: 0.8; letter-spacing: -1px; }
        .logo-text-box span { color: #1a3a5f; font-weight: 800; font-size: 36px; }

        /* Search Section */
        .search-container { width: 100%; max-width: 800px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 25px; text-align: center; border: 1px solid #e0e0e0; }
        .main-search { width: 100%; padding: 16px 20px; border: 2px solid #eee; border-radius: 35px; outline: none; font-size: 16px; margin-bottom: 18px; transition: 0.3s; }
        .main-search:focus { border-color: #1a3a5f; }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
        button { padding: 12px 24px; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 14px; }
        .btn-search { background: #1a3a5f; color: white; }
        .btn-tab { background: #34a853; color: white; }
        .btn-clear { background: #ea4335; color: white; }
        button:hover { opacity: 0.9; transform: scale(1.02); }

        /* Multi-Tab Grid */
        #results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .result-card { background: white; padding: 18px; border-radius: 18px; border-top: 6px solid #1a3a5f; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .result-card h3 { color: #1a3a5f; font-size: 20px; margin-bottom: 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 8px; }
        
        /* Image Box */
        .img-box { width: 100%; height: 220px; background: #f8f9fa; border-radius: 12px; margin-bottom: 15px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #eee; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .img-box i { font-size: 45px; color: #ddd; }

        .result-card p { font-size: 15px; color: #444; line-height: 1.6; height: 100px; overflow-y: auto; padding-right: 5px; }
        /* Scrollbar styling */
        p::-webkit-scrollbar { width: 4px; }
        p::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="logo-section" onclick="window.location.reload()">
        <div class="gear-brain-logo"><i class="fa-solid fa-brain"></i></div>
        <div class="logo-text-box"><h1>USMAN<span>.GK</span></h1></div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="main-search" placeholder="Search anything (e.g. Pakistan, Jupiter, Tiger)...">
        <div class="btn-group">
            <button class="btn-search" onclick="multiSearch(1)">Search Result</button>
            <button class="btn-tab" onclick="multiSearch(2)">2 Tabs (Images)</button>
            <button class="btn-tab" onclick="multiSearch(4)">4 Tabs (Images)</button>
            <button class="btn-clear" onclick="document.getElementById('results-grid').innerHTML=''">Clear All</button>
        </div>
    </div>

    <div id="results-grid"></div>

    <script>
        async function multiSearch(count) {
            const query = document.getElementById('searchInput').value.trim();
            const grid = document.getElementById('results-grid');
            if (!query) return;

            for (let i = 0; i < count; i++) {
                const cardId = `id-${Date.now()}-${i}`;
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <h3><i class="fa-regular fa-lightbulb"></i> ${query}</h3>
                    <div class="img-box" id="img-container-${cardId}">
                        <i class="fa-solid fa-circle-notch fa-spin" id="loader-${cardId}"></i>
                        <img id="pic-${cardId}" alt="Search Result">
                    </div>
                    <p id="text-${cardId}">Searching World Intelligence...</p>
                `;
                grid.prepend(card);
                fetchData(query, cardId);
            }
        }

        async function fetchData(query, cardId) {
            try {
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const data = await res.json();

                const imgElement = document.getElementById(`pic-${cardId}`);
                const loader = document.getElementById(`loader-${cardId}`);
                
                if (data.thumbnail && data.thumbnail.source) {
                    imgElement.src = data.thumbnail.source;
                    imgElement.style.display = "block";
                    loader.style.display = "none";
                } else {
                    loader.className = "fa-solid fa-image-slash";
                }

                document.getElementById(`text-${cardId}`).innerText = data.extract || "I am sorry, no detailed info found for this topic.";
            } catch (e) {
                document.getElementById(`text-${cardId}`).innerText = "Connection error. Please try again.";
            }
        }
    </script>
</body>
</html>
