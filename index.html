<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USMAN.GK - Intelligence Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f7f9; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        /* --- LOGO --- */
        .logo-container { margin-bottom: 10px; text-align: center; cursor: pointer; }
        .logo-box { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .logo-icon { 
            width: 60px; height: 60px; background: #1a3a5f; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(26, 58, 95, 0.2);
        }
        .logo-icon i { color: #f1c40f; font-size: 30px; }
        .logo-text { font-size: 38px; font-weight: 800; color: #1a3a5f; letter-spacing: -1.5px; }
        .logo-text span { color: #f1c40f; }

        /* --- TRANSLATE BOX --- */
        #google_translate_element { margin-bottom: 20px; min-height: 40px; }

        /* --- SEARCH SECTION --- */
        .search-wrapper { 
            width: 100%; max-width: 750px; background: white; padding: 30px; 
            border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); margin-bottom: 40px; 
        }
        .search-bar { 
            width: 100%; padding: 18px 25px; border: 2px solid #f0f0f0; 
            border-radius: 50px; outline: none; font-size: 17px; transition: 0.3s;
            background: #fafafa;
        }
        .search-bar:focus { border-color: #1a3a5f; background: #fff; }
        
        .btn-flex { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 20px; }
        button { padding: 12px 28px; border: none; border-radius: 50px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 15px; }
        .btn-main { background: #1a3a5f; color: white; }
        .btn-multi { background: #27ae60; color: white; }
        .btn-reset { background: #e74c3c; color: white; }
        button:hover { transform: translateY(-3px); }

        /* --- GRID --- */
        #results-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
            gap: 25px; width: 100%; max-width: 1250px; 
        }
        .result-card { 
            background: white; border-radius: 22px; overflow: hidden; 
            box-shadow: 0 12px 30px rgba(0,0,0,0.04); border: 1px solid #eee;
            display: flex; flex-direction: column; min-height: 500px; position: relative;
        }
        .close-btn {
            position: absolute; top: 10px; right: 10px; width: 30px; height: 30px;
            background: rgba(231, 76, 60, 0.9); color: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; font-size: 14px; border: 2px solid white;
        }

        .img-frame { 
            width: 100%; height: 250px; background: #000; 
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; border-bottom: 1px solid #f0f0f0;
        }
        .img-frame img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .content-frame { padding: 20px; display: flex; flex-direction: column; flex-grow: 1; }
        .content-frame h3 { color: #1a3a5f; font-size: 20px; margin-bottom: 10px; font-weight: 600; text-transform: capitalize; }
        .text-scroll { font-size: 14.5px; color: #444; line-height: 1.6; max-height: 180px; overflow-y: auto; padding-right: 8px; }
        
        /* Hide Google Translate Toolbar */
        .goog-te-banner-frame.skiptranslate { display: none !important; }
        body { top: 0px !important; }
    </style>
</head>
<body>

    <div class="logo-container" onclick="window.location.reload()">
        <div class="logo-box">
            <div class="logo-icon"><i class="fa-solid fa-brain"></i></div>
            <div class="logo-text">USMAN<span>.GK</span></div>
        </div>
    </div>

    <div id="google_translate_element"></div>

    <div class="search-wrapper">
        <input type="text" id="userInput" class="search-bar" placeholder="Ask usman.gk...">
        <div class="btn-flex">
            <button class="btn-main" onclick="handleSearch(1)">Search Result</button>
            <button class="btn-multi" onclick="handleSearch(2)">2 Tabs</button>
            <button class="btn-multi" onclick="handleSearch(4)">4 Tabs</button>
            <button class="btn-reset" onclick="document.getElementById('results-container').innerHTML=''"><i class="fa-solid fa-rotate"></i> Clear</button>
        </div>
    </div>

    <div id="results-container"></div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({
                pageLanguage: 'en',
                includedLanguages: 'ur,en,hi',
                layout: google.translate.TranslateElement.InlineLayout.SIMPLE
            }, 'google_translate_element');
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        async function handleSearch(qty) {
            const query = document.getElementById('userInput').value.trim();
            const container = document.getElementById('results-container');
            if (!query) return;

            for (let i = 0; i < qty; i++) {
                const uniqueId = `item-${Date.now()}-${i}`;
                const skeleton = `
                    <div class="result-card" id="card-${uniqueId}">
                        <div class="close-btn" onclick="removeTab('${uniqueId}')"><i class="fa-solid fa-xmark"></i></div>
                        <div class="img-frame" id="img-${uniqueId}"><i class="fa-solid fa-spinner fa-spin" style="color:#555"></i></div>
                        <div class="content-frame">
                            <h3>${query}</h3>
                            <div class="text-scroll" id="txt-${uniqueId}">Scanning sources...</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('afterbegin', skeleton);
                fetchSearchData(query, uniqueId);
            }
        }

        function removeTab(id) {
            document.getElementById(`card-${id}`).remove();
        }

        async function fetchSearchData(topic, id) {
            const imgDiv = document.getElementById(`img-${id}`);
            const textDiv = document.getElementById(`txt-${id}`);

            try {
                // First Priority: Wikipedia (Best for Cities like Lahore/Multan)
                const wikiRes = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(topic)}`);
                const wikiData = await wikiRes.json();

                if (wikiData.extract && wikiData.type !== "disambiguation") {
                    imgDiv.innerHTML = wikiData.originalimage ? `<img src="${wikiData.originalimage.source}">` : `<i class="fa-solid fa-image-slash" style="color:#555;font-size:40px"></i>`;
                    textDiv.innerText = wikiData.extract;
                } else {
                    // Second Priority: DuckDuckGo (Best for YouTubers/Modern topics)
                    const ddgRes = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(topic)}&format=json&origin=*`);
                    const ddgData = await ddgRes.json();
                    
                    if (ddgData.AbstractText) {
                        textDiv.innerText = ddgData.AbstractText;
                        imgDiv.innerHTML = ddgData.Image ? `<img src="https://duckduckgo.com${ddgData.Image}">` : `<i class="fa-solid fa-image-slash" style="color:#555;font-size:40px"></i>`;
                    } else {
                        textDiv.innerText = "No specific details found on usman.gk.";
                    }
                }
            } catch (e) {
                textDiv.innerText = "Searching failed. Check internet.";
            }
        }
    </script>
</body>
</html>
