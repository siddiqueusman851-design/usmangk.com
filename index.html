<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2NOWsbs816OSk1GecBJou36Uqp7U_nKZoMvcj-Z29mo" />
    <title>usman.gk - World Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: #f4f7fa; padding: 20px; display: flex; flex-direction: column; align-items: center; }

        /* --- MODERN LOGO DESIGN --- */
        .logo-section { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-bottom: 30px; 
            cursor: pointer;
            transition: 0.4s;
        }
        .logo-section:hover { transform: translateY(-5px); }
        
        .brand-icon {
            width: 70px; height: 70px;
            background: linear-gradient(45deg, #1a3a5f, #2e5a88);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 10px 20px rgba(26, 58, 95, 0.3);
            margin-bottom: 10px;
            position: relative;
            overflow: hidden;
        }
        .brand-icon i { color: #f1c40f; font-size: 30px; z-index: 2; animation: pulse 2s infinite; }
        .brand-icon::after {
            content: ''; position: absolute; width: 100%; height: 100%;
            background: linear-gradient(transparent, rgba(255,255,255,0.2));
            top: 0; left: 0;
        }

        .logo-text-box h1 { 
            font-size: 32px; color: #1a3a5f; font-weight: 800; letter-spacing: 1px;
            text-shadow: 1px 1px 0px #fff;
        }
        .logo-text-box span { color: #f1c40f; font-weight: 900; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* --- SEARCH BOX --- */
        .search-container { 
            width: 100%; max-width: 750px; background: white; padding: 25px; 
            border-radius: 25px; box-shadow: 0 5px 25px rgba(0,0,0,0.05); 
            margin-bottom: 30px; border: 1px solid #eef1f5;
        }
        .main-search { 
            width: 100%; padding: 18px 25px; border: 2px solid #f0f0f0; 
            border-radius: 50px; outline: none; font-size: 17px; 
            transition: 0.3s; background: #fafafa;
        }
        .main-search:focus { border-color: #1a3a5f; background: #fff; box-shadow: 0 0 15px rgba(26,58,95,0.1); }
        
        .btn-group { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin-top: 15px; }
        button { padding: 12px 28px; border: none; border-radius: 50px; cursor: pointer; font-weight: 700; transition: 0.3s; font-size: 14px; }
        .btn-search { background: #1a3a5f; color: white; box-shadow: 0 4px 10px rgba(26,58,95,0.2); }
        .btn-tab { background: #27ae60; color: white; }
        .btn-clear { background: #e74c3c; color: white; }
        button:hover { transform: scale(1.05); filter: brightness(1.1); }

        /* --- RESULT CARDS --- */
        #results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .result-card { background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee; box-shadow: 0 8px 20px rgba(0,0,0,0.03); animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .result-card h3 { color: #1a3a5f; font-size: 19px; margin-bottom: 12px; border-left: 4px solid #f1c40f; padding-left: 10px; }
        
        /* WORKING IMAGE BOX */
        .img-container { 
            width: 100%; height: 230px; background: #f9f9f9; 
            border-radius: 15px; margin-bottom: 15px; overflow: hidden; 
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #f0f0f0;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; }
        .img-container i { font-size: 50px; color: #ddd; }

        .result-card p { font-size: 14px; color: #555; line-height: 1.6; height: 110px; overflow-y: auto; padding-right: 5px; }
    </style>
</head>
<body>

    <div class="logo-section" onclick="window.location.reload()">
        <div class="brand-icon">
            <i class="fa-solid fa-brain"></i>
        </div>
        <div class="logo-text-box">
            <h1>USMAN<span>.GK</span></h1>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="main-search" placeholder="Search anything (e.g. Moon, Tiger, Ferrari)...">
        <div class="btn-group">
            <button class="btn-search" onclick="multiSearch(1)"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            <button class="btn-tab" onclick="multiSearch(2)">2 Tabs</button>
            <button class="btn-tab" onclick="multiSearch(4)">4 Tabs</button>
            <button class="btn-clear" onclick="document.getElementById('results-grid').innerHTML=''"><i class="fa-solid fa-trash-can"></i> Clear</button>
        </div>
    </div>

    <div id="results-grid"></div>

    <script>
        async function multiSearch(count) {
            const query = document.getElementById('searchInput').value.trim();
            const grid = document.getElementById('results-grid');
            if (!query) return;

            for (let i = 0; i < count; i++) {
                const cardId = `id-${Date.now()}-${i}`;
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <h3>${query}</h3>
                    <div class="img-container" id="img-box-${cardId}">
                        <i class="fa-solid fa-circle-notch fa-spin"></i>
                    </div>
                    <p id="text-${cardId}">Fetching intelligence...</p>
                `;
                grid.prepend(card);
                fetchData(query, cardId);
            }
        }

        async function fetchData(query, cardId) {
            try {
                // Wikipedia API with Image
                const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
                const data = await res.json();

                const imgBox = document.getElementById(`img-box-${cardId}`);
                
                // IMAGE FUNCTION LOGIC
                if (data.originalimage && data.originalimage.source) {
                    imgBox.innerHTML = `<img src="${data.originalimage.source}" alt="Result">`;
                } else if (data.thumbnail && data.thumbnail.source) {
                    imgBox.innerHTML = `<img src="${data.thumbnail.source}" alt="Result">`;
                } else {
                    imgBox.innerHTML = `<i class="fa-solid fa-image-slash"></i>`;
                }

                document.getElementById(`text-${cardId}`).innerText = data.extract || "No specific details found for this topic.";
            } catch (e) {
                document.getElementById(`text-${cardId}`).innerText = "Network error. Try again.";
            }
        }
    </script>
</body>
</html>
