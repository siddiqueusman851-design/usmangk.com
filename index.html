<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="2NOWsbs816OSk1GecBJou36Uqp7U_nKZoMvcj-Z29mo" />
    <title>usman.gk - World Intelligence</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f4f7f6; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 20px; }
        .logo-section { display: flex; align-items: center; margin-top: 30px; margin-bottom: 20px; cursor: pointer; }
        .gear-brain-logo { width: 60px; height: 60px; margin-right: 12px; background: linear-gradient(135deg, #1a3a5f 50%, #c5a02e 50%); clip-path: polygon(50% 0%, 61% 5%, 72% 0%, 80% 10%, 95% 12%, 90% 28%, 100% 38%, 95% 54%, 100% 70%, 85% 78%, 80% 95%, 65% 90%, 50% 100%, 35% 90%, 20% 95%, 15% 78%, 0% 70%, 5% 54%, 0% 38%, 10% 28%, 5% 12%, 20% 10%, 28% 0%, 39% 5%); display: flex; align-items: center; justify-content: center; }
        .gear-brain-logo i { color: white; font-size: 25px; }
        .logo-text-box h1 { font-size: 38px; color: #1a3a5f; font-weight: 900; line-height: 0.8; }
        .logo-text-box span { font-size: 42px; color: #1a3a5f; font-weight: 800; }
        .search-wrapper { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 15px; }
        .main-search { width: 100%; padding: 15px 20px; border: 1px solid #dfe1e5; border-radius: 30px; font-size: 16px; outline: none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .button-group { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .btn-main { padding: 12px 25px; background: #1a3a5f; color: white; border: none; border-radius: 25px; font-weight: bold; cursor: pointer; }
        .btn-multi { padding: 10px 15px; background: #34a853; color: white; border: none; border-radius: 20px; font-size: 14px; cursor: pointer; }
        #result-display { width: 100%; max-width: 650px; margin-top: 20px; display: none; }
        .info-card { padding: 20px; background: white; border-radius: 15px; border: 1px solid #dadce0; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .video-wrapper { width: 100%; border-radius: 15px; overflow: hidden; background: #000; border: 1px solid #ddd; }
        /* Iframe height adjustment */
        .video-wrapper iframe { width: 100%; height: 400px; border: none; }
    </style>
</head>
<body>

    <div class="logo-section" onclick="window.location.reload()">
        <div class="gear-brain-logo"><i class="fa-solid fa-brain"></i></div>
        <div class="logo-text-box"><h1>USMAN</h1><span>.GK</span></div>
    </div>

    <div class="search-wrapper">
        <input type="text" id="searchInput" class="main-search" placeholder="Search (MrBeast, Moon, Cricket)...">
        <div class="button-group">
            <button class="btn-main" onclick="executeSearch()">Search Knowledge</button>
            <button class="btn-multi" onclick="openMultiTabs(3)">3 Google Tabs</button>
        </div>
    </div>

    <div id="result-display">
        <div class="info-card">
            <h2 id="rtitle" style="color: #1a3a5f;"></h2>
            <p id="rtext" style="margin-top:10px; color: #333; line-height: 1.6;"></p>
        </div>
        
        <div class="info-card" style="padding: 10px;">
            <h3 style="margin: 10px; color:red;"><i class="fa-brands fa-youtube"></i> Related Videos</h3>
            <div id="video-box" class="video-wrapper">
                </div>
        </div>
    </div>

    <script>
        async function executeSearch() {
            let query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            document.getElementById('result-display').style.display = "block";
            document.getElementById('rtitle').innerText = "Searching...";
            document.getElementById('rtext').innerText = "Please wait...";

            try {
                // Wikipedia Smart Search
                const searchUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*`;
                const searchRes = await fetch(searchUrl);
                const searchData = await searchRes.json();

                if (searchData.query.search.length > 0) {
                    const bestTitle = searchData.query.search[0].title;
                    const summaryUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bestTitle)}`;
                    const summaryRes = await fetch(summaryUrl);
                    const data = await summaryRes.json();

                    document.getElementById('rtitle').innerText = data.title;
                    document.getElementById('rtext').innerText = data.extract;
                } else {
                    document.getElementById('rtitle').innerText = "No Result Found";
                    document.getElementById('rtext').innerText = "Humne dhoonda lekin kuch nahi mila.";
                }

                // FIXED VIDEO SECTION
                // Hum YouTube search results ko Google ke 'Video' filter ke sath embed karenge
                const videoIframe = `<iframe src="https://www.google.com/search?q=${encodeURIComponent(query)}+youtube+video&tbm=vid&igu=1"></iframe>`;
                document.getElementById('video-box').innerHTML = videoIframe;

            } catch (e) {
                document.getElementById('rtitle').innerText = "Error";
                document.getElementById('video-box').innerHTML = "<p style='color:white; padding:20px;'>Video load hone mein masla hua.</p>";
            }
        }

        function openMultiTabs(count) {
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;
            for (let i = 0; i < count; i++) {
                window.open(`https://www.google.com/search?q=${encodeURIComponent(query)}`, '_blank');
            }
        }
    </script>
</body>
</html>
